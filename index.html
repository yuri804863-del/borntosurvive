<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSAKA SURVIVAL</title>
    <style>
        :root { --main-red: #e63946; --bg-black: #0d0d0d; }
        body { background: var(--bg-black); color: #eee; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #status-bar { position: fixed; top: 0; width: 100%; background: rgba(20,20,20,0.9); padding: 10px; display: flex; justify-content: space-around; font-size: 12px; border-bottom: 1px solid #333; z-index: 100; color: var(--main-red); }
        #log { height: 100vh; overflow-y: auto; padding: 60px 20px 120px 20px; box-sizing: border-box; font-size: 16px; line-height: 1.6; }
        #input-area { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 15px; box-sizing: border-box; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--main-red); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; }
        .system { color: #ff4d4d; font-weight: bold; }
        .ai { color: #eee; }
        .user { color: #888; border-left: 2px solid #444; padding-left: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="status-bar">
    <span>💓 健康: <b id="hp">100</b>%</span>
    <span>💧 水分: <b id="water">100</b>%</span>
    <span>📍 大阪 · 浪速区</span>
</div>

<div id="log">
    <p class="system">【系统】连接成功。请输入你的 Google API Key 激活生存协议...</p>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="输入动作或 API Key...">
    <button onclick="handleInput()">行动</button>
</div>

<script>
    let apiKey = "";
    // 注入你的真实背景：25岁，在大阪，持有JLPT N2证书
    const SYSTEM_PROMPT = "你是一个硬核末日求生模拟器。当前时间：2026年3月。地点：日本大阪。玩家属性：25岁，持有JLPT N2证书（日语沟通有加成）。要求：1. 剧情必须基于真实大阪地理（如难波、大国町）。2. 每轮行动后更新健康、水分数值。3. 风格极其写实。";

    async function handleInput() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        if (!apiKey) {
            apiKey = text;
            appendLog("API Key 已记录。正在同步大阪浪速区卫星地图...", "system");
            input.value = "";
            return;
        }

        appendLog(text, "user");
        input.value = "";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `${SYSTEM_PROMPT}\n玩家行动：${text}` }] }] })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            appendLog(reply, "ai");
        } catch (e) {
            appendLog("连接失败，请检查 API Key 或网络环境。", "system");
        }
    } 

    function appendLog(msg, type) {
        const div = document.createElement('div');
        div.className = type;
        div.innerText = msg;
        const log = document.getElementById('log');
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
</script>
</body>
</html>
